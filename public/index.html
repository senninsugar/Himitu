<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1d1d1f;
            --accent: #0071e3;
            --gray: #f5f5f7;
            --sub: #86868b;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px);
            z-index: 100;
            padding: 20px;
            border-bottom: 1px solid #d2d2d7;
        }

        .search-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: var(--gray);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { background: #e8e8ed; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        button {
            padding: 0 24px;
            background: var(--fg);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* Grid */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 40px 24px;
        }

        /* Card: Minimal Modern */
        .card {
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover { transform: translateY(-8px); }

        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1.4;
            border-radius: 18px;
            overflow: hidden;
            background: var(--gray);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            font-size: 13px;
            color: var(--sub);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 10px;
            background: var(--gray);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--fg);
        }

        /* Loading Animation */
        .skeleton {
            animation: pulse 1.5s infinite ease-in-out;
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
        }

        @keyframes pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<nav>
    <div class="search-wrapper">
        <input type="text" id="q" placeholder="Search archive..." value="艦これ">
        <button onclick="search()">Find</button>
    </div>
</nav>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>
    async function search() {
        const q = document.getElementById('q').value;
        const grid = document.getElementById('grid');
        if (!q) return;

        // スケルトン表示（読み込み中）
        grid.innerHTML = Array(8).fill(0).map(() => `
            <div class="card">
                <div class="img-container skeleton"></div>
                <div class="title skeleton" style="height:20px; width:80%"></div>
            </div>
        `).join('');

        try {
            // 自前Node.jsサーバーへリクエスト
            const res = await fetch(`http://localhost:3000/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            
            grid.innerHTML = '';
            data.result.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${item.image || 'https://via.placeholder.com/300x420'}" alt="">
                    </div>
                    <div class="title">${item.title}</div>
                    <div class="meta">
                        <span class="tag">${item.rule}</span>
                        <span>ID: ${item.id.replace('/','')}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = '<p>Connection Error.</p>';
        }
    }

    document.getElementById('q').addEventListener('keypress', e => e.key === 'Enter' && search());
    search();
</script>

</body>
</html>
