<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Reader</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1d1d1f;
            --gray: #f5f5f7;
            --border: #d2d2d7;
            --accent: #0071e3;
        }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        nav {
            position: sticky; top: 0; background: rgba(255,255,255,0.8);
            backdrop-filter: saturate(180%) blur(20px); z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .nav-content {
            max-width: 1000px; margin: 0 auto; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .brand { font-weight: 700; font-size: 18px; cursor: pointer; }
        .search-bar { flex: 0 1 300px; }
        .search-bar input {
            width: 100%; padding: 8px 16px; border-radius: 10px;
            border: none; background: var(--gray); font-size: 14px; outline: none;
        }

        /* Grid */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 30px 20px;
        }

        /* Card */
        .card { cursor: pointer; transition: transform 0.2s ease; }
        .card:hover { transform: translateY(-4px); }
        .card img {
            width: 100%; aspect-ratio: 1/1.4; object-fit: cover;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: var(--gray);
        }
        .card-title { margin-top: 10px; font-size: 13px; font-weight: 600; line-height: 1.4; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Modal / Reader */
        .modal {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: none; overflow-y: auto;
        }
        .modal-close {
            position: fixed; top: 20px; right: 20px; font-size: 24px;
            cursor: pointer; z-index: 1001; width: 40px; height: 40px;
            background: rgba(0,0,0,0.05); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .reader-content { max-width: 800px; margin: 0 auto; padding: 60px 0; }
        .reader-header { text-align: center; padding: 0 20px 40px; }
        .reader-header h1 { font-size: 24px; margin-bottom: 8px; }
        .reader-meta { color: #86868b; font-size: 14px; }
        .img-stack img { width: 100%; display: block; margin-bottom: 2px; }

        .loader { text-align: center; padding: 100px; color: var(--sub); }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-content">
        <div class="brand" onclick="location.reload()">ARCHIVE</div>
        <div class="search-bar">
            <input type="text" id="si" placeholder="Search..." onkeypress="if(event.key==='Enter') search()">
        </div>
    </div>
</nav>

<main class="container">
    <div id="grid" class="grid"></div>
</main>

<div id="modal" class="modal">
    <div class="modal-close" onclick="closeModal()">&times;</div>
    <div id="readerBody"></div>
</div>

<script>
    const api = (path) => `${window.location.origin}/api/${path}`;

    async function search() {
        const q = document.getElementById('si').value;
        const grid = document.getElementById('grid');
        if (!q) return;

        grid.innerHTML = '<div class="loader">Searching...</div>';
        try {
            const res = await fetch(api(`search?q=${encodeURIComponent(q)}`));
            const data = await res.json();
            grid.innerHTML = '';
            data.result.forEach(item => {
                const el = document.createElement('div');
                el.className = 'card';
                el.onclick = () => openReader(item.id, item.rule);
                el.innerHTML = `
                    <img src="${item.image || ''}" loading="lazy">
                    <div class="card-title">${item.title}</div>
                `;
                grid.appendChild(el);
            });
        } catch (e) { grid.innerHTML = 'Error fetching results.'; }
    }

    async function openReader(id, rule) {
        const modal = document.getElementById('modal');
        const body = document.getElementById('readerBody');
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        body.innerHTML = '<div class="loader">Converting all pages to Base64...</div>';

        try {
            const res = await fetch(api(`detail?id=${id}&rule=${rule}`));
            const json = await res.json();
            const d = json.data;

            body.innerHTML = `
                <div class="reader-content">
                    <div class="reader-header">
                        <h1>${d.title}</h1>
                        <div class="reader-meta">${d.circle} | ${d.pages}</div>
                    </div>
                    <div class="img-stack">
                        ${d.imageUrlsBase64.map(src => src ? `<img src="${src}">` : '').join('')}
                    </div>
                </div>
            `;
        } catch (e) { body.innerHTML = '<div class="loader">Error loading reader.</div>'; }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Initial search
    search();
</script>
</body>
</html>
